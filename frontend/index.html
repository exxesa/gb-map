<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>GB Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css">

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- SIDEBAR -->

    <button id="toggleSidebarBtn">
    ☰ Hide Panel
</button>

<input
    type="text"
    id="searchInput"
    placeholder="Search object...">

<div id="coordinatesBox">

    <h3>Coordinates</h3>

    <p id="coordinatesText">
        Click on map
    </p>

</div>

    <div class="sidebar">

        <h1>GB Map</h1>

        <p>
            Click on the map and add a new object.
        </p>

        <input
            type="text"
            id="name"
            placeholder="Name">

        <input
            type="text"
            id="country"
            placeholder="Country">

        <input
            type="text"
            id="city"
            placeholder="City">

        <input
            type="text"
            id="category"
            placeholder="Category">

        <textarea
            id="description"
            placeholder="Description">
        </textarea>

        <button id="saveButton">
            Save Object
        </button>

    </div>

    <!-- MAP -->

    <div id="map"></div>

    <!-- LEAFLET -->

    <script
        src="https://unpkg.com/leaflet/dist/leaflet.js">
    </script>

    <!-- PROJECT FILES -->

    <script src="js/connection.js"></script>

    <script src="js/map.js"></script>

    <script src="js/sidebar.js"></script>

</body>

</html>
