<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>GB Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css">

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- LEFT PANEL -->

   <div class="left-panel hidden" id="leftPanel">

        <h1>GB Map</h1>

        <input
            type="text"
            id="searchInput"
            placeholder="Search object...">

        <div id="objectList"></div>

    </div>

    <!-- MAP -->

    <div id="mapContainer">

        <div id="map"></div>

        <!-- PANEL BUTTONS -->

        <div id="mapControls">

            <button id="toggleLeftPanel">
📋
</button>

<button id="toggleRightPanel">
📝
</button>

        </div>

    </div>

    <!-- RIGHT PANEL -->

<div class="right-panel hidden" id="rightPanel">

        <h2>Add Object</h2>

        <input
            type="text"
            id="name"
            placeholder="Name">

        <input
            type="text"
            id="country"
            placeholder="Country">

        <input
            type="text"
            id="city"
            placeholder="City">

        <select id="category">

            <option value="">
                Select category
            </option>

            <option value="🏪 Shop">
                🏪 Shop
            </option>

            <option value="🏦 Bank">
                🏦 Bank
            </option>

            <option value="🏭 Factory">
                🏭 Factory
            </option>

            <option value="⚓ Port">
                ⚓ Port
            </option>

            <option value="⛽ Gas Station">
                ⛽ Gas Station
            </option>

            <option value="🚚 Logistics">
                🚚 Logistics
            </option>

        </select>

        <input
            type="text"
            id="coordinates"
            placeholder="Coordinates"
            readonly>

        <textarea
            id="description"
            placeholder="Description"></textarea>

        <button id="saveButton">
            Save Object
        </button>

    </div>

    <!-- LEAFLET -->

    <script
        src="https://unpkg.com/leaflet/dist/leaflet.js">
    </script>

    <!-- PROJECT FILES -->

    <script src="js/connection.js"></script>
    <script src="js/map.js"></script>
    <script src="js/sidebar.js"></script>

</body>

</html>
